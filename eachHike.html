<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Web Components for shared navbar and footer layout -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <style>
      .card-container {
        max-height: 350px; /* Adjust the maximum height as needed */
        overflow-y: auto;
      }

      /* Style the individual cards as needed */
      .card {
        width: 45%; /* Adjust the width as per your design, leaving a little space for margins */
        margin: 2%; /* Add margin between cards */
      }
    </style>
  </head>

  <body>
    <site-navbar></site-navbar>
    <main class="container py-4">
      <h1 id="hikeName">Loading...</h1>
      <img
        id="hikeImage"
        class="img-fluid rounded mt-3"
        src=""
        alt="Hike image"
      />
      <div class="text-center mt-3">
        <button id="writeReviewBtn" class="btn btn-primary">
          Write Review
        </button>
      </div>
    </main>
    <div class="container">
      <h2>Reviews:</h2>
      <div id="details-go-here"></div>

      <!-- Vertical stack container -->
      <div id="reviewCardGroup" class="d-flex flex-column gap-3">
        <!-- cards will be appended here -->
      </div>
    </div>

    <template id="reviewCardTemplate">
      <div class="card bg-secondary mx-auto review-card">
        <div class="card-body bg-light py-2 px-3">
          <div class="d-flex justify-content-between align-items-start">
            <h6 class="title mb-1">placeholder</h6>
            <small class="time text-muted">placeholder</small>
          </div>

          <div class="star-rating small mb-2"></div>

          <!-- Organized details in 2 columns -->
          <div class="row g-1 small">
            <div class="col-6">
              <span class="fw-semibold">Level:</span>
              <span class="level">placeholder</span>
            </div>
            <div class="col-6">
              <span class="fw-semibold">Season:</span>
              <span class="season">placeholder</span>
            </div>
            <div class="col-6">
              <span class="fw-semibold">Scrambled:</span>
              <span class="scrambled">placeholder</span>
            </div>
            <div class="col-6">
              <span class="fw-semibold">Flooded:</span>
              <span class="flooded">placeholder</span>
            </div>
          </div>

          <hr class="my-2" />

          <p class="description small mb-0">placeholder</p>
        </div>
      </div>
    </template>

    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/eachHike.js"></script>
  </body>
</html>
